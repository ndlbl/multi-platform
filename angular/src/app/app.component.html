<app-spinner />
<div class="min-h-screen bg-slate-50">
  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-4xl items-center justify-between p-4">
      <a routerLink="/" class="text-xl font-bold text-slate-900">Task Manager</a>

      <nav aria-label="Main Navigation">
        <ul class="flex items-center gap-4 text-sm text-slate-600">
          <li>
            <a
              routerLink="/"
              routerLinkActive="font-medium text-indigo-600"
              [routerLinkActiveOptions]="{ exact: true }"
              ariaCurrentWhenActive="page"
              >Home</a
            >
          </li>
          <li>
            <a
              ariaCurrentWhenActive="page"
              routerLink="/about"
              routerLinkActive="font-medium text-indigo-600"
              >About</a
            >
          </li>

          @if (hydrated() && isLoggedIn()) {
            <li>
              <a
                ariaCurrentWhenActive="page"
                routerLink="/tasks"
                routerLinkActive="font-medium text-indigo-600"
                >Tasks</a
              >
            </li>
            <li>
              <a
                ariaCurrentWhenActive="page"
                routerLink="/library"
                routerLinkActive="font-medium text-indigo-600"
                >Library</a
              >
            </li>

            @if (isAdmin()) {
              <li>
                <a
                  ariaCurrentWhenActive="page"
                  routerLink="/admin"
                  routerLinkActive="font-medium text-indigo-600"
                  >Admin</a
                >
              </li>
            }
            <li>
              <span class="text-slate-500">{{ currentUser()?.email }}</span>
            </li>
            <li>
              <button (click)="logout()" class="text-slate-600 hover:text-slate-900">
                Log out
              </button>
            </li>
          } @else {
            <li>
              <a
                ariaCurrentWhenActive="page"
                routerLink="/login"
                routerLinkActive="font-medium text-indigo-600"
                >Log in</a
              >
            </li>
            <li>
              <a
                ariaCurrentWhenActive="page"
                routerLink="/register"
                routerLinkActive="font-medium text-indigo-600"
                >Register</a
              >
            </li>
          }
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <router-outlet />
  </main>
</div>
<app-toast-host />
