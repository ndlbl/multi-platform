<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>TaskManager</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="icons/icon-96x96.png" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#3c489e" />
    <link rel="apple-touch-icon" href="icons/icon-152x152.png" />
  </head>
  <body>
    <app-root>
      <!-- Generic pre-bootstrap loader: shown on client-rendered routes until Angular
           boots (prerendered routes overwrite this). Self-contained inline styles so it
           renders before any app/Tailwind CSS loads. -->
      <div
        role="status"
        aria-label="Loading"
        style="
          position: fixed;
          inset: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #f8fafc;
        "
      >
        <div
          style="
            width: 2rem;
            height: 2rem;
            border: 4px solid #e2e8f0;
            border-top-color: #4f46e5;
            border-radius: 9999px;
            animation: app-spin 0.8s linear infinite;
          "
        ></div>
      </div>
      <style>
        @keyframes app-spin {
          to {
            transform: rotate(360deg);
          }
        }
      </style>
    </app-root>
  </body>
</html>
